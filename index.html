<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DevShell</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- Custom title bar -->
  <div id="titlebar">
    <div class="titlebar-drag">
      <span class="titlebar-title">DevShell</span>
    </div>
    <div class="titlebar-controls">
      <button class="titlebar-btn" id="btn-minimize">&#x2013;</button>
      <button class="titlebar-btn" id="btn-maximize">&#x25A1;</button>
      <button class="titlebar-btn titlebar-btn-close" id="btn-close">&#x2715;</button>
    </div>
  </div>

  <div id="app">
    <!-- Sidebar: repo groups with worktree tabs -->
    <div id="sidebar">
      <div id="sidebar-header">
        <span id="sidebar-section-label">WORKSPACES</span>
        <button id="btn-open-directory" title="Open Directory">Open</button>
      </div>
      <div id="repo-groups"></div>
      <div class="sidebar-spacer"></div>
    </div>

    <!-- Main content area -->
    <div id="main-content">
      <!-- VS Code webviews area -->
      <div id="editor-area">
        <div id="editor-placeholder">
          <div class="placeholder-content">
            <h2>DevShell</h2>
            <p>Click <strong>Open</strong> to scan a directory for repositories</p>
            <p class="placeholder-hint">Bare repos with worktrees will appear in the sidebar</p>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
