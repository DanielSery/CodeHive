<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Terminal</title>
  <link rel="stylesheet" href="node_modules/@xterm/xterm/css/xterm.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- Custom title bar -->
  <div id="titlebar">
    <div class="titlebar-drag">
      <span class="titlebar-title">Terminal</span>
    </div>
    <div class="titlebar-controls">
      <button class="titlebar-btn titlebar-btn-new" id="btn-new-tab" title="New Terminal (Ctrl+T)">+</button>
      <button class="titlebar-btn" id="btn-minimize">&#x2013;</button>
      <button class="titlebar-btn" id="btn-maximize">&#x25A1;</button>
      <button class="titlebar-btn titlebar-btn-close" id="btn-close">&#x2715;</button>
    </div>
  </div>

  <div id="app">
    <!-- Vertical tab sidebar -->
    <div id="sidebar">
      <div id="tab-list"></div>
      <button id="new-tab-btn" title="New Terminal (Ctrl+T)">+</button>
    </div>

    <!-- Terminal area -->
    <div id="terminal-container"></div>
  </div>

  <script src="node_modules/@xterm/xterm/lib/xterm.js"></script>
  <script src="node_modules/@xterm/addon-fit/lib/addon-fit.js"></script>
  <script src="node_modules/@xterm/addon-web-links/lib/addon-web-links.js"></script>
  <script src="renderer.js"></script>
</body>
</html>
